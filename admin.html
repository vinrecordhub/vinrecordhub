<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — VIN Record Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808; --white: #f4f4ef; --accent: #e8ff3f;
      --accent2: #3fffb0; --gray: #111; --gray2: #1a1a1a;
      --mid: #666; --border: rgba(255,255,255,0.07);
    }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

    /* LOGIN */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card { background: var(--gray); border: 1px solid var(--border); border-radius: 16px; padding: 3rem; width: 100%; max-width: 400px; }
    .login-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; margin-bottom: 2rem; }
    .login-logo span { color: var(--accent); }
    .login-card h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; margin-bottom: 0.4rem; }
    .login-card p { color: var(--mid); font-size: 0.85rem; margin-bottom: 2rem; }
    .login-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 0.9rem 1.1rem; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; margin-bottom: 1rem; }
    .login-input:focus { border-color: rgba(232,255,63,0.4); }
    .login-btn { width: 100%; background: var(--accent); color: var(--black); border: none; border-radius: 8px; padding: 0.9rem; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem; cursor: pointer; }
    .login-err { color: #ff6b6b; font-size: 0.82rem; margin-top: 0.75rem; display: none; }

    /* ADMIN PANEL */
    .admin-wrap { display: none; }

    /* NAV */
    .admin-nav { background: var(--gray); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .admin-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; }
    .admin-logo span { color: var(--accent); }
    .admin-badge { background: rgba(232,255,63,0.1); border: 1px solid rgba(232,255,63,0.3); color: var(--accent); font-size: 0.7rem; padding: 0.25rem 0.75rem; border-radius: 100px; letter-spacing: 0.08em; }
    .btn-logout { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--mid); font-size: 0.8rem; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; }
    .btn-logout:hover { color: var(--white); }

    /* CONTENT */
    .admin-content { padding: 2rem; max-width: 1200px; margin: 0 auto; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--gray); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .stat-label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); margin-bottom: 0.5rem; }
    .stat-value { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; letter-spacing: -0.03em; }
    .stat-value.green { color: var(--accent2); }
    .stat-value.yellow { color: var(--accent); }
    .stat-sub { font-size: 0.75rem; color: var(--mid); margin-top: 0.25rem; }

    /* FILTERS */
    .filters { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .search-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 1rem; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; width: 260px; }
    .search-input::placeholder { color: var(--mid); }
    .search-input:focus { border-color: rgba(232,255,63,0.3); }
    .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--mid); font-size: 0.8rem; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover, .filter-btn.active { background: rgba(232,255,63,0.1); border-color: rgba(232,255,63,0.3); color: var(--accent); }
    .btn-refresh { background: var(--accent); color: var(--black); border: none; border-radius: 8px; padding: 0.6rem 1.25rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; margin-left: auto; }

    /* TABLE */
    .table-wrap { background: var(--gray); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .table-header { display: grid; grid-template-columns: 50px 1fr 1fr 120px 100px 100px; gap: 1rem; padding: 0.85rem 1.25rem; background: var(--gray2); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); }
    .table-row { display: grid; grid-template-columns: 50px 1fr 1fr 120px 100px 100px; gap: 1rem; padding: 1rem 1.25rem; border-top: 1px solid var(--border); align-items: center; transition: background 0.15s; font-size: 0.85rem; }
    .table-row:hover { background: rgba(255,255,255,0.02); }
    .row-num { color: var(--mid); font-size: 0.78rem; }
    .row-email { color: var(--white); }
    .row-vin { font-family: monospace; font-size: 0.8rem; color: var(--accent2); letter-spacing: 0.05em; }
    .row-plan { font-size: 0.78rem; }
    .plan-tag { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.72rem; font-weight: 500; }
    .plan-carfax { background: rgba(232,255,63,0.1); color: var(--accent); }
    .plan-autocheck { background: rgba(63,255,176,0.1); color: var(--accent2); }
    .plan-combo { background: rgba(138,43,226,0.2); color: #b87fff; }
    .row-amount { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); }
    .row-date { font-size: 0.75rem; color: var(--mid); }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--mid); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .loading-state { text-align: center; padding: 3rem; color: var(--mid); }

    /* PAGINATION */
    .pagination { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border-top: 1px solid var(--border); font-size: 0.82rem; color: var(--mid); }
    .page-btns { display: flex; gap: 0.5rem; }
    .page-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--mid); padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    .page-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: var(--white); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    @media(max-width:768px) {
      .table-header, .table-row { grid-template-columns: 1fr 1fr; }
      .table-header span:nth-child(n+3), .table-row > *:nth-child(n+3) { display: none; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">VIN<span>Record</span>Hub</div>
    <h2>Admin Panel</h2>
    <p>Enter your admin password to continue.</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="Admin password..." onkeypress="if(event.key==='Enter') login()"/>
    <button class="login-btn" onclick="login()">Sign In →</button>
    <div class="login-err" id="loginErr">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap" id="adminWrap">
  <nav class="admin-nav">
    <div class="admin-logo">VIN<span>Record</span>Hub <span class="admin-badge">ADMIN</span></div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </nav>

  <div class="admin-content">

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value yellow" id="statTotal">—</div>
        <div class="stat-sub">all time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value green" id="statRevenue">—</div>
        <div class="stat-sub">all time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today's Orders</div>
        <div class="stat-value yellow" id="statToday">—</div>
        <div class="stat-sub" id="statTodayRev">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Order Value</div>
        <div class="stat-value green" id="statAvg">—</div>
        <div class="stat-sub">per transaction</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <input type="text" class="search-input" id="searchInput" placeholder="Search email or VIN..." oninput="filterOrders()"/>
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('carfax', this)">Carfax</button>
      <button class="filter-btn" onclick="setFilter('autocheck', this)">AutoCheck</button>
      <button class="filter-btn" onclick="setFilter('combo', this)">Combo</button>
      <button class="btn-refresh" onclick="loadOrders()">↻ Refresh</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-header">
        <span>#</span>
        <span>Email</span>
        <span>VIN</span>
        <span>Plan</span>
        <span>Amount</span>
        <span>Date</span>
      </div>
      <div id="tableBody">
        <div class="loading-state">Loading orders...</div>
      </div>
      <div class="pagination">
        <span id="pageInfo">—</span>
        <div class="page-btns">
          <button class="page-btn" id="prevBtn" onclick="changePage(-1)" disabled>← Prev</button>
          <button class="page-btn" id="nextBtn" onclick="changePage(1)" disabled>Next →</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const ADMIN_PASSWORD = 'Wzin2020lol!';  // ← Change this to your password
  const SUPABASE_URL = 'https://wqsiqiydixnpqnngxmjl.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_UYXTOHS0jvhXJwUiCecs_A_Gx_gwCRR'; // ← Add your anon key

  // ─── STATE ────────────────────────────────────────────────
  let allOrders = [];
  let filteredOrders = [];
  let currentFilter = 'all';
  let currentPage = 1;
  const PER_PAGE = 20;

  // ─── AUTH ─────────────────────────────────────────────────
  function login() {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem('adminAuth', '1');
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminWrap').style.display = 'block';
      loadOrders();
    } else {
      document.getElementById('loginErr').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }

  function logout() {
    sessionStorage.removeItem('adminAuth');
    location.reload();
  }

  // Check if already logged in
  if (sessionStorage.getItem('adminAuth') === '1') {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
  }

  // ─── LOAD ORDERS ──────────────────────────────────────────
  async function loadOrders() {
    document.getElementById('tableBody').innerHTML = '<div class="loading-state">Loading orders...</div>';

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc`,
        {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          }
        }
      );

      if (!res.ok) throw new Error('Failed to fetch orders');
      allOrders = await res.json();

      updateStats();
      filterOrders();

    } catch (err) {
      document.getElementById('tableBody').innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load orders: ${err.message}</p></div>`;
    }
  }

  // ─── STATS ────────────────────────────────────────────────
  function updateStats() {
    const total = allOrders.length;
    const revenue = allOrders.reduce((sum, o) => sum + parseFloat(o.amount || 0), 0);
    const avg = total > 0 ? revenue / total : 0;

    const today = new Date().toDateString();
    const todayOrders = allOrders.filter(o => new Date(o.created_at).toDateString() === today);
    const todayRevenue = todayOrders.reduce((sum, o) => sum + parseFloat(o.amount || 0), 0);

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statRevenue').textContent = '$' + revenue.toFixed(2);
    document.getElementById('statToday').textContent = todayOrders.length;
    document.getElementById('statTodayRev').textContent = '$' + todayRevenue.toFixed(2) + ' today';
    document.getElementById('statAvg').textContent = '$' + avg.toFixed(2);
  }

  // ─── FILTER ───────────────────────────────────────────────
  function setFilter(filter, btn) {
    currentFilter = filter;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterOrders();
  }

  function filterOrders() {
    const search = document.getElementById('searchInput').value.toLowerCase();

    filteredOrders = allOrders.filter(o => {
      const matchPlan = currentFilter === 'all' || o.plan === currentFilter ||
        (currentFilter === 'carfax' && (o.plan === 'standard' || o.plan === 'carfax')) ||
        (currentFilter === 'autocheck' && (o.plan === 'plus' || o.plan === 'autocheck'));
      const matchSearch = !search ||
        (o.email || '').toLowerCase().includes(search) ||
        (o.paypal_order_id || '').toLowerCase().includes(search);
      return matchPlan && matchSearch;
    });

    currentPage = 1;
    renderTable();
  }

  // ─── RENDER TABLE ─────────────────────────────────────────
  function renderTable() {
    const start = (currentPage - 1) * PER_PAGE;
    const end = start + PER_PAGE;
    const pageOrders = filteredOrders.slice(start, end);
    const totalPages = Math.ceil(filteredOrders.length / PER_PAGE);

    document.getElementById('pageInfo').textContent =
      `Showing ${start + 1}–${Math.min(end, filteredOrders.length)} of ${filteredOrders.length} orders`;
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;

    if (pageOrders.length === 0) {
      document.getElementById('tableBody').innerHTML =
        `<div class="empty-state"><div class="empty-icon">📭</div><p>No orders found</p></div>`;
      return;
    }

    const planLabels = {
      carfax: 'Carfax', standard: 'Carfax',
      autocheck: 'AutoCheck', plus: 'AutoCheck',
      combo: 'Combo',
    };
    const planClasses = {
      carfax: 'plan-carfax', standard: 'plan-carfax',
      autocheck: 'plan-autocheck', plus: 'plan-autocheck',
      combo: 'plan-combo',
    };

    document.getElementById('tableBody').innerHTML = pageOrders.map((o, i) => {
      const date = new Date(o.created_at);
      const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      const plan = o.plan || 'carfax';
      const orderId = (o.paypal_order_id || '').substring(0, 12) + '...';

      return `
        <div class="table-row">
          <span class="row-num">${start + i + 1}</span>
          <span class="row-email" title="${o.email}">${o.email || '—'}</span>
          <span class="row-vin" title="${o.paypal_order_id}">${orderId}</span>
          <span class="row-plan"><span class="plan-tag ${planClasses[plan] || 'plan-carfax'}">${planLabels[plan] || plan}</span></span>
          <span class="row-amount">$${parseFloat(o.amount || 0).toFixed(2)}</span>
          <span class="row-date">${dateStr}<br/><span style="font-size:0.7rem">${timeStr}</span></span>
        </div>`;
    }).join('');
  }

  function changePage(dir) {
    currentPage += dir;
    renderTable();
    window.scrollTo(0, 0);
  }

  // Init: check auth on load
  if (sessionStorage.getItem('adminAuth') === '1') {
    loadOrders();
  }
</script>
</body>
</html>
