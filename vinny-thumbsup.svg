<svg viewBox="0 0 180 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VINny mascot giving thumbs up">
  <!-- Drop shadow -->
  <ellipse cx="90" cy="192" rx="50" ry="8" fill="rgba(0,0,0,0.18)"/>

  <!-- Left arm (resting) -->
  <rect x="22" y="110" width="24" height="42" rx="12" fill="#c99525"/>
  <ellipse cx="34" cy="153" rx="12" ry="10" fill="#c99525"/>

  <!-- Right arm (extended for thumbs up) -->
  <rect x="136" y="100" width="28" height="44" rx="14" fill="#c99525" transform="rotate(15 150 122)"/>
  <!-- Thumb -->
  <ellipse cx="158" cy="98" rx="8" ry="14" fill="#c99525" transform="rotate(-20 158 98)"/>
  <!-- Fist base -->
  <ellipse cx="150" cy="118" rx="14" ry="12" fill="#c99525"/>

  <!-- Body -->
  <ellipse cx="90" cy="142" rx="58" ry="56" fill="#d4a832"/>
  <!-- Body inner highlight -->
  <ellipse cx="84" cy="130" rx="30" ry="26" fill="#e8c14a" opacity="0.25"/>

  <!-- Left ear -->
  <circle cx="42" cy="50" r="20" fill="#c99525"/>
  <circle cx="42" cy="50" r="12" fill="#d4a832"/>

  <!-- Right ear -->
  <circle cx="138" cy="50" r="20" fill="#c99525"/>
  <circle cx="138" cy="50" r="12" fill="#d4a832"/>

  <!-- Head -->
  <circle cx="90" cy="74" r="58" fill="#d4a832"/>

  <!-- Face area (lighter oval) -->
  <ellipse cx="90" cy="80" rx="38" ry="34" fill="#e8c14a" opacity="0.45"/>

  <!-- Left eye white (slightly squinted — happy expression) -->
  <ellipse cx="72" cy="70" rx="13" ry="11" fill="white"/>
  <!-- Left pupil -->
  <circle cx="74" cy="71" r="7.5" fill="#0f1422"/>
  <!-- Left eye shine -->
  <circle cx="76" cy="68" r="3" fill="white"/>
  <!-- Happy squint crease -->
  <path d="M 60 66 Q 72 62 84 66" stroke="#d4a832" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Right eye white (slightly squinted) -->
  <ellipse cx="108" cy="70" rx="13" ry="11" fill="white"/>
  <!-- Right pupil -->
  <circle cx="110" cy="71" r="7.5" fill="#0f1422"/>
  <!-- Right eye shine -->
  <circle cx="112" cy="68" r="3" fill="white"/>
  <!-- Happy squint crease -->
  <path d="M 96 66 Q 108 62 120 66" stroke="#d4a832" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Left blush (bigger, happier) -->
  <ellipse cx="58" cy="88" rx="13" ry="9" fill="#ff8888" opacity="0.6"/>
  <!-- Right blush (bigger, happier) -->
  <ellipse cx="122" cy="88" rx="13" ry="9" fill="#ff8888" opacity="0.6"/>

  <!-- Big smile / grin -->
  <path d="M 70 100 Q 90 122 110 100" stroke="#6b4400" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Smile inner fill for extra cheerfulness -->
  <path d="M 72 102 Q 90 120 108 102 Q 90 114 72 102" fill="#6b4400" opacity="0.15"/>

  <!-- Badge on body -->
  <rect x="62" y="130" width="56" height="32" rx="8" fill="#0b1c44"/>
  <rect x="65" y="133" width="50" height="26" rx="6" fill="#0f2255" stroke="#d4a832" stroke-width="1" opacity="0.8"/>
  <!-- Car silhouette icon -->
  <g transform="translate(70, 138)">
    <rect x="2" y="6" width="30" height="12" rx="4" fill="#d4a832"/>
    <path d="M 6 6 L 10 0 L 24 0 L 28 6 Z" fill="#d4a832"/>
    <circle cx="8" cy="19" r="3.5" fill="#0b1c44"/>
    <circle cx="8" cy="19" r="1.5" fill="#d4a832" opacity="0.6"/>
    <circle cx="26" cy="19" r="3.5" fill="#0b1c44"/>
    <circle cx="26" cy="19" r="1.5" fill="#d4a832" opacity="0.6"/>
  </g>

  <!-- Plushie seam on head -->
  <path d="M 90 18 Q 90 30 90 40" stroke="#c99525" stroke-width="2" stroke-dasharray="3,3" fill="none" opacity="0.5"/>

  <!-- Stars / sparkles around thumbs up -->
  <path d="M 162 82 L 164 78 L 166 82 L 162 82" fill="#f5d44a"/>
  <circle cx="170" cy="92" r="3" fill="#f5d44a" opacity="0.9"/>
  <path d="M 155 70 L 157 65 L 159 70 L 155 70" fill="#f5d44a" opacity="0.8"/>
</svg>
